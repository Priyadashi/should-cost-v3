version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: shouldcost
      POSTGRES_PASSWORD: shouldcost
      POSTGRES_DB: shouldcost
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://shouldcost:shouldcost@db:5432/shouldcost
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
