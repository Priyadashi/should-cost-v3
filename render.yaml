services:
  - type: web
    name: shouldcost-backend
    env: docker
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOW_ALL
        value: "true"

  - type: web
    name: shouldcost-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
