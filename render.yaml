databases:
  - name: shouldcost-db
    plan: free
    databaseName: shouldcost
    user: shouldcost

services:
  - type: web
    name: shouldcost-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shouldcost-db
          property: connectionString
      - key: CORS_ALLOW_ALL
        value: "true"

  - type: web
    name: shouldcost-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
